<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termometro Digital</title>
    <link rel="stylesheet" href="Term.css">
</head>
<body>
    <div class="container" align="center">
        <div class="form">
            <h1>Termometro Digital</h1>
            <br><br><br>
            <label for="numero">Insira o número</label><br>
            <input type="number" id="numero" placeholder="Ex: 25">
            <br><br><br>

            <label for="situacao">Situação</label><br>
            <select name="situacao" id="situacao">
                <option value="verao">Verão 🔥</option>
                <option value="inverno">Inverno ❄️</option>
            </select>
            <br>
            
            <button class="botao" id="verificarBtn">Verificar</button>

            <script src="Term.js"></script>
        </div>
    </div>
    
</body>
</html>
