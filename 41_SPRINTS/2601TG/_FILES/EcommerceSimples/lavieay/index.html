<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Vie A&Y</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="imagens/sla.png" />
  </head>
  <body>
    <div class="login">
      <div class="login2">
        <img src="imagens/nome_login.png" class="imgLogin" alt="La Vie A&Y" />

        <p>
          Seja bem-vindo de volta à La Vie A&Y. É uma alegria ter você novamente
          em nosso espaço de fé, delicadeza e amor.
        </p>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seuemail@exemplo.com..." />

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha..." />

        <a href="indexEsqueceuSenha.html" class="link-recuperar"
          >Recuperar acesso</a
        >

        <button class="botao-entrar" type="button">ENTRAR</button>

        <a href="indexCadastro.html" class="link-cadastro">Criar cadastro</a>
      </div>
    </div>

    <div id="alerta-custom" class="alerta">
      <div class="alerta-box">
        <p id="alerta-texto"></p>
        <button onclick="fecharAlerta()">OK</button>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
