<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Cadastro - La Vie A&Y</title>
    <link rel="stylesheet" href="styleCadastro.css" />
    <link rel="icon" type="image/png" href="imagens/sla.png" />
  </head>
  <body>
    <main class="tela-cadastro">
      <section class="container-cadastro">
        <img src="imagens/nome_login.png" alt="La Vie A&Y" class="logo" />

        <h2>Criar Cadastro</h2>

        <p>Preencha os campos abaixo para criar sua conta.</p>

        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome..." />

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite seu email..." />

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Crie uma senha..." />

        <label for="confirmarSenha">Confirmar senha</label>
        <input
          type="password"
          id="confirmarSenha"
          placeholder="Confirme sua senha..."
        />

        <button class="botao">Cadastrar</button>

        <a href="index.html" class="link-voltar">Voltar para o login</a>
      </section>
    </main>

    <div id="alerta-custom" class="alerta">
      <div class="alerta-box">
        <p id="alerta-texto"></p>
        <button onclick="fecharAlerta()">OK</button>
      </div>
    </div>

    <script src="cadastro.js"></script>
  </body>
</html>
